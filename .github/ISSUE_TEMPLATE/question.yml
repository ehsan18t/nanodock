name: Question / Support
description: Ask a question about usage or troubleshooting
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Need help using nanodock? Ask your question below. For bugs, please use
        the Bug Report template instead.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you need help with.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Any relevant details (OS, nanodock version, container runtime, code
        snippets, etc.).
